<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>シンプル掲示板</title>
<style>
body{font-family:Arial,sans-serif;background:#f4f6f9;margin:0;padding:20px}
.container{max-width:800px;margin:auto}.post{background:#fff;padding:20px;margin:15px 0;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.1)}
.post-title{margin:0}.post-meta{color:#666;font-size:.9em}.reply{margin-top:15px;padding:12px;background:#eef7ff;border-left:5px solid #2196f3}
.delete-box{text-align:right;margin-top:12px}
</style></head><body>
<div class="container">
<h1>📌 シンプル掲示板</h1>
<h2>新規投稿</h2>
<iframe src="https://forms.gle/5ZSwKdBBeKTVZppW8" width="100%" height="500"></iframe>
<h2>投稿一覧</h2>
<div id="posts">読み込み中...</div>
</div>
<script>
const API_URL="https://script.google.com/macros/s/AKfycbxFdYvu5GHDzwV-ZdK8UabPzMkmLoHZe_qxMm22V4htGPkySoc-qkhDACd7kwppZbyZ/exec";
function h(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
async function loadPosts(){
 const c=document.getElementById("posts");
 const r=await fetch(API_URL); const posts=await r.json();
 c.innerHTML=posts.reverse().map((p,i)=>`<div class="post">
<h3 class="post-title">${h(p.タイトル||"無題")}</h3>
<div class="post-meta">投稿者：${h(p.名前||"匿名")} ${new Date(p.タイムスタンプ).toLocaleString("ja-JP")}</div>
<p>${h(p.内容)}</p>
<small>👍 ${p.いいね||0}</small>
${p.返信?`<div class="reply"><b>管理者から返信</b><br><br>${h(p.返信)}</div>`:""}
<div class="delete-box">
<input type="password" id="pass${i}" placeholder="削除用パス">
<button onclick='deletePost(${JSON.stringify("").slice(0,0)}${JSON.stringify("")})' style="display:none"></button>
<button onclick='deletePost(${JSON.stringify("")})' style="display:none"></button>
<button onclick='deletePostData(${JSON.stringify("")})' style="display:none"></button>
<button onclick='deletePost(${JSON.stringify(p.タイトル||"")},${JSON.stringify(p.名前||"")},${JSON.stringify(p.内容||"")},${i})'>削除</button>
</div></div>`).join("");
}
async function deletePost(title,name,content,index){
 const pass=document.getElementById("pass"+index).value;
 if(!pass){alert("削除用パスを入力してください。");return;}
 const q=new URLSearchParams({action:"delete",title,name,content,pass});
 const res=await fetch(API_URL+"?"+q.toString());
 const result=await res.json();
 if(result.success){alert("削除しました。");loadPosts();}else alert(result.message||"削除できません");
}
window.onload=loadPosts;
</script></body></html>
